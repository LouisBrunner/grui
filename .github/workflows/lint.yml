# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    uses: LouisBrunner/.github/.github/workflows/lint-all.yml@main
    permissions:
      actions: read
      contents: read
      statuses: write
      pull-requests: write
    with:
      with_rust: true

  vet:
    uses: LouisBrunner/.github/.github/workflows/lint-rust.yml@main
    permissions:
      contents: read

  test:
    uses: LouisBrunner/.github/.github/workflows/lint-rust.yml@main
    permissions:
      contents: read
    with:
      run: cargo test --features testing
