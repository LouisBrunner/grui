[package]
name = "godot-grui-macros"
version.workspace = true
edition.workspace = true
description = "Proc macros for godot-grui: control!, #[component], #[class]"
readme = "README.md"
repository.workspace = true
license.workspace = true
keywords = ["gdextension", "godot", "macros", "reactive", "ui"]
categories = ["game-development", "gui"]

[lib]
proc-macro = true

[dependencies]
convert_case = "0.11.0"
convert_case_extras = "0.2.0"
from-attr = "0.1.3"
proc-macro-error2 = { version = "2.0.0", default-features = false }
proc-macro2 = "1.0.93"
quote = "1.0.38"
rstml = { version = "0.12.1", features = ["rawtext-stable-hack"] }
rstml-control-flow = "0.1.1"
strum = { version = "0.28.0", features = ["derive"] }
syn = { version = "2.0.98", features = ["full"] }

[dev-dependencies]
godot = { workspace = true }
pretty_assertions = { workspace = true }
