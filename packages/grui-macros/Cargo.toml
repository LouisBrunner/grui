[package]
name = "grui-macros"
version.workspace = true
edition.workspace = true

[lib]
proc-macro = true

[dependencies]
convert_case = "0.10.0"
from-attr = "0.1.3"
godot = { workspace = true }
proc-macro2 = "1.0.93"
proc-macro-error2 = { version = "2.0.0", default-features = false }
quote = "1.0.38"
rstml = { version = "0.12.1", features = ["rawtext-stable-hack"] }
rstml-control-flow = "0.1.1"
syn = { version = "2.0.98", features = ["full"] }
strum = { version = "0.28.0", features = ["derive"] }

[dev-dependencies]
pretty_assertions = { workspace = true }
