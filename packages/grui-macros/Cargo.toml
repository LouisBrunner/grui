[package]
name = "grui-macros"
version.workspace = true
edition.workspace = true

[lib]
proc-macro = true

[dependencies]
convert_case = "0.10.0"
godot = { workspace = true }
proc-macro2 = "1.0.93"
quote = "1.0.38"
rstml = { version = "0.12.1", features = ["rawtext-stable-hack"] }
rstml-control-flow = "0.1.1"
syn = { version = "2.0.98", features = ["full"] }

[dev-dependencies]
pretty_assertions = { workspace = true }
