[package]
name = "godot-grui"
version.workspace = true
edition.workspace = true
description = "Reactive, declarative UI framework for Godot 4 in Rust"
readme = "README.md"
repository.workspace = true
license.workspace = true
keywords = ["gamedev", "gdextension", "godot", "reactive", "ui"]
categories = ["game-development", "gui"]

[dependencies]
any_spawner = { version = "0.3.0" }
erased = "0.1.2"
frunk = "0.4.4"
godot = { workspace = true }
godot-grui-macros = { workspace = true }
indexmap = "2.13.0"
log = "0.4.29"
next_tuple = "0.1.0"
reactive_graph = { version = "0.2.13", features = ["effects"] }
similar = "3.1.1"
strum = { version = "0.27.2", features = ["derive"] }
typed-builder = "0.23.2"

serde = { version = "1.0.228", features = ["derive"], optional = true }
serde_json = { version = "1.0.149", optional = true }
tokio = { version = "1.50.0", features = ["macros", "rt"], optional = true }
uuid = { version = "1.22.0", features = ["v4"], optional = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
test-log = { version = "0.2" }

[features]
default = []
testing = [
  "any_spawner/futures-executor",
  "any_spawner/tokio",
  "serde",
  "serde_json",
  "tokio",
  "uuid"
]
